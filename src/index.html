<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0a;
        }
        .nav-link.active {
            color: #fff;
            text-decoration: underline;
            text-underline-offset: 8px;
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-12 md:px-32 py-6 text-white mix-blend-difference">
        <a href="#" class="font-semibold text-xl tracking-tighter">Focus Room</a>
        <ul class="flex gap-8 font-medium uppercase text-sm tracking-widest text-white/60">
            <li><a href="#" class="nav-link" data-index="0">Online</a></li>
            <li><a href="#" class="nav-link" data-index="1">Live</a></li>
            <li><a href="#" class="nav-link" data-index="2">Focus</a></li>
            <li><a href="#" class="nav-link" data-index="3">Together</a></li>
            <li><a href="#" class="nav-link" data-index="4">Join</a></li>
        </ul>
    </nav>

    <section id="horizontal" class="h-screen overflow-hidden">
        <div id="scroll-container" class="flex h-screen w-max">
            
            <div class="panel w-screen h-screen shrink-0 flex items-center justify-center">
                <div class="bg-black/20 px-20 py-10 backdrop-blur-sm">
                    <h1 class="text-[12vw] font-['Bebas_Neue'] leading-none text-white">ONLINE</h1>
                </div>
            </div>

            <div class="panel w-screen h-screen shrink-0 flex items-center justify-center">
                <div class="bg-black/20 px-20 py-10 backdrop-blur-sm">
                    <h1 class="text-[12vw] font-['Bebas_Neue'] leading-none text-white">LIVE ROOMS</h1>
                </div>
            </div>

            <div class="panel w-screen h-screen shrink-0 flex items-center justify-center">
                <div class="bg-black/20 px-20 py-10 backdrop-blur-sm">
                    <h1 class="text-[12vw] font-['Bebas_Neue'] leading-none text-white">STAY FOCUSED</h1>
                </div>
            </div>

            <div class="panel w-screen h-screen shrink-0 flex items-center justify-center">
                <div class="bg-black/20 px-20 py-10 backdrop-blur-sm">
                    <h1 class="text-[12vw] font-['Bebas_Neue'] leading-none text-white">WORK TOGETHER</h1>
                </div>
            </div>

            <div class="panel w-screen h-screen shrink-0 flex items-center justify-center">
                <div class="bg-black/20 px-20 py-10 backdrop-blur-sm">
                    <h1 class="text-[12vw] font-['Bebas_Neue'] leading-none text-white">JOIN NOW</h1>
                </div>
            </div>

        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
